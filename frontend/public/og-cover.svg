  <!-- Wordmark: font-family references Cinzel/Cairo/Amiri (self-hosted by
       the app for in-app rendering). Viewers without those fonts installed
       fall back to serif/sans-serif — a known limitation for this static
       file, called out in the delivery report. All four lines are
       center-aligned on a shared x so the RTL Arabic/Bismillah lines (which
       render leftward from their anchor) can't collide with the icon. -->
