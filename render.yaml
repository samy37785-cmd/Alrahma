services:
  - type: web
    name: al-rahma-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://alrahma-xi.vercel.app
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: PAYMOB_CURRENCY
        value: EGP
      - key: PAYMOB_EUR_TO_EGP
        value: "55"
      - key: PAYPAL_MODE
        value: sandbox
      # ── Set these manually in the Render dashboard (secret values) ──────────
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: PAYMOB_API_KEY
        sync: false
      - key: PAYMOB_HMAC_SECRET
        sync: false
      - key: PAYMOB_INTEGRATION_ID_CARD
        sync: false
      - key: PAYMOB_INTEGRATION_ID_WALLET
        sync: false
      - key: PAYMOB_IFRAME_ID
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
