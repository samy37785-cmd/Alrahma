<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Al-Rahma Academy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b6e4f"/>
      <stop offset="1" stop-color="#15885f"/>
    </linearGradient>
    <!-- carve a crescent: white circle minus an offset black circle -->
    <mask id="crescent">
      <rect width="64" height="64" fill="black"/>
      <circle cx="29" cy="22" r="12" fill="white"/>
      <circle cx="34" cy="19" r="10" fill="black"/>
    </mask>
  </defs>

  <!-- rounded green tile -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- gold crescent -->
  <rect width="64" height="64" fill="#d4af37" mask="url(#crescent)"/>

  <!-- gold star -->
  <circle cx="44" cy="14" r="2.4" fill="#d4af37"/>

  <!-- open book (Quran) -->
  <g>
    <path d="M32 43 C26 39 18 39 13 41 L13 53 C18 51 26 51 32 54 Z" fill="#ffffff"/>
    <path d="M32 43 C38 39 46 39 51 41 L51 53 C46 51 38 51 32 54 Z" fill="#f1f3f2"/>
    <rect x="31" y="43" width="2" height="11" rx="1" fill="#0b6e4f"/>
  </g>
</svg>
