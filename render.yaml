services:
  - type: web
    name: Alrahma-1
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Core ──────────────────────────────────────────────────────────────────
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        sync: false

      # ── CORS ─────────────────────────────────────────────────────────────────
      - key: CLIENT_URL
        sync: false
      # Vercel account-scope suffix for preview-deploy origins (see
      # backend/.env.example). Unset = preview origins are not CORS-allowed.
      - key: VERCEL_PREVIEW_SCOPE
        sync: false

      # ── Email (SMTP) ──────────────────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      # Optional fallback recipient for contact-form email when ADMIN_EMAIL is unset.
      - key: EMAIL_FROM
        sync: false

      # ── Cron jobs ─────────────────────────────────────────────────────────────
      # Triggered by .github/workflows/cron.yml (GitHub Actions schedule):
      # renewal reminders daily at 09:00 UTC, weekly parent reports Sundays at
      # 08:00 UTC. Requires the CRON_SECRET GitHub repository secret to match
      # this env var — the workflow fails loudly if the secret is missing.
      - key: CRON_SECRET
        sync: false
      - key: RENEWAL_REMINDER_DAYS
        sync: false

      # ── Stripe ────────────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── PayPal (API) ──────────────────────────────────────────────────────────
      - key: PAYPAL_MODE
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false

      # ── Manual payment display details ────────────────────────────────────────
      # Customer-facing display values, not credentials — the checkout page's
      # manual-payment method list is built from whichever of these are set.
      - key: PAYPAL_RECEIVER_EMAIL
        sync: false
      - key: PAYPAL_ME_LINK
        sync: false
      - key: PAYONEER_EMAIL
        sync: false
      - key: BANK_NAME
        sync: false
      - key: BANK_ACCOUNT_NAME
        sync: false
      - key: BANK_IBAN
        sync: false
      - key: BANK_SWIFT
        sync: false
      - key: BANK_CURRENCY
        sync: false
      - key: BANK_COUNTRY
        sync: false
      - key: WU_RECEIVER_NAME
        sync: false
      - key: WU_RECEIVER_COUNTRY
        sync: false
      - key: WU_RECEIVER_CITY
        sync: false
      - key: MG_RECEIVER_NAME
        sync: false
      - key: MG_RECEIVER_COUNTRY
        sync: false
      - key: MG_RECEIVER_CITY
        sync: false

      # ── Admin dashboard (zero-trust) ──────────────────────────────────────────
      - key: ADMIN_JWT_ACCESS_SECRET
        sync: false
      - key: ADMIN_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_IP_WHITELIST
        sync: false

      # ── Google Sign-In ────────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false

      # ── AI Tutor (Claude API) ─────────────────────────────────────────────────
      # Unset = the AI Tutor feature responds 503 (disabled); rest of the app
      # is unaffected.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_TUTOR_DAILY_MESSAGE_LIMIT
        sync: false

      # ── Redis (optional — enables distributed rate limiting) ──────────────────
      - key: REDIS_URL
        sync: false

      # ── Logging (optional) ────────────────────────────────────────────────────
      # Winston level: error | warn | info | http | debug (default: info in prod).
      - key: LOG_LEVEL
        sync: false
